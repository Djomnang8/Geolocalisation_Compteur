name: frontend_flutter
description: >-
  SOCADEL Geoloc - Application mobile de geolocalisation des compteurs
  electriques de SOCADEL dans la ville de Douala (agence de Koumassi).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  # Calendrier et selecteur de plage de dates en francais
  flutter_localizations:
    sdk: flutter

  # Appels HTTP vers l'API Frontend (BFF, port 8080)
  http: ^1.2.2
  # Cartographie OpenStreetMap (gratuite, sans cle API)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  # Capture de la position GPS lors de la visite d'un compteur
  geolocator: ^13.0.1
  # Polices IBM Plex Sans / IBM Plex Mono (identiques a la maquette)
  google_fonts: ^6.2.1
  intl: any
  cupertino_icons: ^1.0.8
  # Photo de l'inspection (camera / galerie)
  image_picker: ^1.1.2
  # Fichier joint au rapport (PDF, DOCX, TXT...)
  file_picker: ^8.1.4
  # Ouverture des pieces jointes recues (admin) avec l'application associee
  open_filex: ^4.5.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # Generation de l'icone de l'application (icone thematique GCES)
  flutter_launcher_icons: ^0.14.1

# Icone de l'application : pictogramme thematique (marqueur de geolocalisation
# + eclair) et non le logo de l'entreprise. Le nom affiche sous l'icone, GCES,
# vient du android:label du fichier AndroidManifest.xml.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icone_app.png"
  adaptive_icon_background: "#15357A"
  adaptive_icon_foreground: "assets/icone_app_adaptive.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
