# ===========================================================================
# API FRONTEND (BFF / passerelle) - port 8080
# Seule porte d'entree exposee a l'application mobile Flutter.
# Elle transmet les demandes a l'API Backend (port 8081), jamais l'inverse.
# ===========================================================================
spring.application.name=socadel-api-frontend
server.port=8080

# Adresse interne de l'API Backend (non exposee a Internet)
app.backend.url=http://localhost:8081

# Meme cle secrete que l'API Backend pour verifier les jetons JWT
app.jwt.secret=SOCADEL-GEOLOC-2026-CLE-SECRETE-PARTAGEE-ENTRE-LES-DEUX-API
