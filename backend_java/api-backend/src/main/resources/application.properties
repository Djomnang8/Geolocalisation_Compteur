# ===========================================================================
# API BACKEND (microservices metier) - port 8081
# N'est pas exposee a Internet : seule l'API Frontend (port 8080) l'appelle.
# ===========================================================================
spring.application.name=socadel-api-backend
server.port=8081

# --- Base de donnees MySQL (XAMPP : utilisateur root, sans mot de passe) ---
spring.datasource.url=jdbc:mysql://localhost:3306/socadel_geoloc?useSSL=false&serverTimezone=Africa/Douala&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=

# Le schema est cree par le script database/socadel_geoloc.sql (phpMyAdmin)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- Securite : jeton JWT partage avec l'API Frontend ---
app.jwt.secret=SOCADEL-GEOLOC-2026-CLE-SECRETE-PARTAGEE-ENTRE-LES-DEUX-API
app.jwt.expiration-heures=24
