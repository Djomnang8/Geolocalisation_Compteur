# ===========================================================================
# API BACKEND (microservices metier) - port 8081
# N'est pas exposee a Internet : seule l'API Frontend (port 8080) l'appelle.
# ===========================================================================
spring.application.name=socadel-api-backend
server.port=8081

# --- Base de donnees MySQL ---
# En local (XAMPP) : localhost:3306, utilisateur root sans mot de passe.
# En Docker : les variables SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD
# pointent vers le service « mysql » du docker-compose (voir docker-compose.yml).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/socadel_geoloc?useSSL=false&serverTimezone=Africa/Douala&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Le schema est cree par le script database/socadel_geoloc.sql (phpMyAdmin)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- Securite : jeton JWT partage avec l'API Frontend ---
app.jwt.secret=SOCADEL-GEOLOC-2026-CLE-SECRETE-PARTAGEE-ENTRE-LES-DEUX-API
app.jwt.expiration-heures=24
